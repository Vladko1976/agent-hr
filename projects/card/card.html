<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Владислав Кондратьев</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0a0a0a;
    --surface: #111111;
    --border: rgba(255,255,255,0.07);
    --accent1: #7c3aed;
    --accent2: #2563eb;
    --accent3: #06b6d4;
    --text: #f0f0f0;
    --muted: #6b7280;
  }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    overflow-x: hidden;
  }

  /* — canvas stars — */
  #stars { position: fixed; inset: 0; z-index: 0; pointer-events: none; }

  /* — layout — */
  .page {
    position: relative;
    z-index: 1;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 40px 16px;
  }

  .card {
    width: 100%;
    max-width: 480px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 28px;
    padding: 52px 40px 44px;
    text-align: center;
    position: relative;
    overflow: hidden;
    box-shadow:
      0 0 0 1px rgba(124,58,237,0.08),
      0 32px 80px rgba(0,0,0,0.7),
      0 0 120px rgba(124,58,237,0.06);
  }

  /* top glow line */
  .card::before {
    content: '';
    position: absolute;
    top: 0; left: 10%; right: 10%;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--accent1), var(--accent3), transparent);
    opacity: 0.6;
  }

  /* ambient inner glow */
  .card::after {
    content: '';
    position: absolute;
    top: -120px; left: 50%;
    transform: translateX(-50%);
    width: 340px; height: 240px;
    background: radial-gradient(ellipse, rgba(124,58,237,0.12) 0%, transparent 70%);
    pointer-events: none;
  }

  /* — avatar — */
  .avatar {
    width: 88px; height: 88px;
    margin: 0 auto 28px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--accent1), var(--accent2), var(--accent3));
    display: flex; align-items: center; justify-content: center;
    font-size: 34px; font-weight: 700; color: #fff;
    letter-spacing: -1px;
    position: relative;
    box-shadow: 0 0 32px rgba(124,58,237,0.45);
    animation: pulse-ring 3s ease-in-out infinite;
  }
  .avatar::before {
    content: '';
    position: absolute; inset: -3px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--accent1), var(--accent3));
    z-index: -1;
    opacity: 0.5;
    animation: spin 8s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }
  @keyframes pulse-ring {
    0%, 100% { box-shadow: 0 0 28px rgba(124,58,237,0.4); }
    50%       { box-shadow: 0 0 48px rgba(6,182,212,0.5); }
  }

  /* — name — */
  .name {
    font-size: clamp(26px, 6vw, 36px);
    font-weight: 800;
    letter-spacing: -0.5px;
    line-height: 1.1;
    background: linear-gradient(135deg, #fff 20%, var(--accent3) 60%, var(--accent1) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    filter: drop-shadow(0 0 18px rgba(6,182,212,0.35));
    margin-bottom: 6px;
    animation: glow-name 4s ease-in-out infinite alternate;
  }

  @keyframes glow-name {
    from { filter: drop-shadow(0 0 12px rgba(124,58,237,0.4)); }
    to   { filter: drop-shadow(0 0 24px rgba(6,182,212,0.55)); }
  }

  /* — roles — */
  .roles {
    display: flex;
    flex-direction: column;
    gap: 6px;
    margin: 18px 0 32px;
  }

  .role {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    font-size: 13px;
    font-weight: 500;
    color: var(--muted);
    letter-spacing: 0.4px;
  }
  .role-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .role:first-child .role-dot { background: var(--accent1); box-shadow: 0 0 6px var(--accent1); }
  .role:last-child  .role-dot { background: var(--accent3); box-shadow: 0 0 6px var(--accent3); }

  /* — divider — */
  .divider {
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--border), transparent);
    margin: 0 0 28px;
  }

  /* — socials — */
  .socials {
    display: flex;
    justify-content: center;
    gap: 16px;
    margin-bottom: 32px;
  }

  .social-btn {
    width: 52px; height: 52px;
    border-radius: 14px;
    border: 1px solid var(--border);
    background: rgba(255,255,255,0.03);
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    text-decoration: none;
    color: var(--muted);
    position: relative;
    transition: transform 0.25s cubic-bezier(.34,1.56,.64,1),
                border-color 0.25s, color 0.25s, box-shadow 0.25s;
    overflow: hidden;
  }
  .social-btn::before {
    content: '';
    position: absolute; inset: 0;
    border-radius: 14px;
    opacity: 0;
    transition: opacity 0.25s;
  }
  .social-btn.tg::before  { background: linear-gradient(135deg,#0088cc22,#00aae422); }

  .social-btn:hover {
    transform: translateY(-4px) scale(1.08);
  }
  .social-btn.tg:hover  {
    border-color: #0088cc88;
    color: #29b6f6;
    box-shadow: 0 8px 28px rgba(0,136,204,0.28);
  }
  .social-btn:hover::before { opacity: 1; }

  .social-btn svg { width: 24px; height: 24px; position: relative; z-index: 1; }

  /* — tooltip — */
  .social-btn .tip {
    position: absolute;
    bottom: calc(100% + 8px);
    left: 50%; transform: translateX(-50%);
    background: #1e1e1e;
    border: 1px solid var(--border);
    color: #ddd;
    font-size: 11px;
    padding: 4px 10px;
    border-radius: 6px;
    white-space: nowrap;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.2s;
  }
  .social-btn:hover .tip { opacity: 1; }

  /* — CTA button — */
  .cta {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    width: 100%;
    padding: 16px 28px;
    border-radius: 14px;
    border: none;
    cursor: pointer;
    font-size: 15px;
    font-weight: 600;
    letter-spacing: 0.3px;
    color: #fff;
    background: linear-gradient(135deg, var(--accent1), var(--accent2), var(--accent3));
    background-size: 200% 200%;
    background-position: 0% 50%;
    text-decoration: none;
    position: relative;
    overflow: hidden;
    transition: transform 0.2s cubic-bezier(.34,1.56,.64,1), box-shadow 0.2s;
    animation: gradient-shift 4s ease infinite;
    box-shadow: 0 4px 24px rgba(124,58,237,0.3);
  }

  @keyframes gradient-shift {
    0%   { background-position: 0% 50%; }
    50%  { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
  }

  .cta::after {
    content: '';
    position: absolute; inset: 0;
    background: rgba(255,255,255,0);
    transition: background 0.2s;
  }
  .cta:hover {
    transform: translateY(-2px) scale(1.015);
    box-shadow: 0 10px 40px rgba(124,58,237,0.5);
  }
  .cta:hover::after { background: rgba(255,255,255,0.07); }
  .cta:active { transform: scale(0.98); }

  .cta svg { width: 20px; height: 20px; flex-shrink: 0; }

  /* — handle tag — */
  .handle {
    margin-top: 20px;
    font-size: 12px;
    color: var(--muted);
    letter-spacing: 0.5px;
  }
  .handle span {
    color: #4b9cd3;
    font-weight: 500;
  }

  /* — mobile — */
  @media (max-width: 400px) {
    .card { padding: 40px 24px 36px; border-radius: 20px; }
    .avatar { width: 76px; height: 76px; font-size: 28px; }
  }
</style>
</head>
<body>

<canvas id="stars"></canvas>

<div class="page">
  <div class="card">

    <div class="avatar">ВК</div>

    <div class="name">Владислав Кондратьев</div>

    <div class="roles">
      <div class="role"><span class="role-dot"></span>Корпоративный юрист</div>
      <div class="role"><span class="role-dot"></span>Специалист по нейросетям и ИИ</div>
    </div>

    <div class="divider"></div>

    <div class="socials">

      <!-- Telegram -->
      <a class="social-btn tg" href="https://t.me/ivladko10" target="_blank" rel="noopener">
        <span class="tip">@ivladko10</span>
        <svg viewBox="0 0 24 24" fill="currentColor">
          <path d="M11.944 0A12 12 0 0 0 0 12a12 12 0 0 0 12 12 12 12 0 0 0 12-12A12 12 0 0 0 12 0a12 12 0 0 0-.056 0zm4.962 7.224c.1-.002.321.023.465.14a.506.506 0 0 1 .171.325c.016.093.036.306.02.472-.18 1.898-.962 6.502-1.36 8.627-.168.9-.499 1.201-.82 1.23-.696.065-1.225-.46-1.9-.902-1.056-.693-1.653-1.124-2.678-1.8-1.185-.78-.417-1.21.258-1.91.177-.184 3.247-2.977 3.307-3.23.007-.032.014-.15-.056-.212s-.174-.041-.249-.024c-.106.024-1.793 1.14-5.061 3.345-.48.33-.913.49-1.302.48-.428-.008-1.252-.241-1.865-.44-.752-.245-1.349-.374-1.297-.789.027-.216.325-.437.893-.663 3.498-1.524 5.83-2.529 6.998-3.014 3.332-1.386 4.025-1.627 4.476-1.635z"/>
        </svg>
      </a>

    </div>

    <a class="cta" href="https://t.me/ivladko10" target="_blank" rel="noopener">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
      </svg>
      Написать мне
    </a>

    <p class="handle">Telegram: <span>@ivladko10</span></p>

  </div>
</div>

<script>
  // ── stars canvas ──
  const canvas = document.getElementById('stars');
  const ctx = canvas.getContext('2d');
  let stars = [];

  function resize() {
    canvas.width  = window.innerWidth;
    canvas.height = window.innerHeight;
  }

  function initStars(n) {
    stars = [];
    for (let i = 0; i < n; i++) {
      stars.push({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height,
        r: Math.random() * 1.2 + 0.2,
        a: Math.random(),
        speed: Math.random() * 0.004 + 0.001,
        phase: Math.random() * Math.PI * 2
      });
    }
  }

  function drawStars(t) {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    for (const s of stars) {
      const alpha = 0.15 + 0.5 * (0.5 + 0.5 * Math.sin(t * s.speed * 1000 + s.phase));
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(200,210,255,${alpha})`;
      ctx.fill();
    }
  }

  function loop(t) {
    drawStars(t / 1000);
    requestAnimationFrame(loop);
  }

  window.addEventListener('resize', () => { resize(); initStars(180); });
  resize();
  initStars(180);
  requestAnimationFrame(loop);
</script>

</body>
</html>
